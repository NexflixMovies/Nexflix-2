<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="refresh" content="0;url=player-movie.html?slug="/>
  <script>
    // Forward the slug parameter to player-movie.html which handles both movies and series
    var slug = new URLSearchParams(window.location.search).get('slug') || '';
    document.querySelector('meta[http-equiv="refresh"]').content = '0;url=player-movie.html?slug=' + encodeURIComponent(slug);
    window.location.replace('player-movie.html?slug=' + encodeURIComponent(slug));
  </script>
</head>
<body></body>
</html>
