<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Watch — NEXFLIX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

  <!-- ✅ Adsterra Ads Only -->
  <script async src="//pl29424738.profitablecpmratenetwork.com/e2/09/55/e209559628f16ab5238236071a6e0088.js"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#07070f;--card:#111120;--border:#1c1c2e;
      --blue:#3b82f6;--blue-d:#1d4ed8;--blue-glow:rgba(59,130,246,.35);
      --text:#e8e8f2;--muted:#6b7280;
    }
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    @keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes hotPulse{0%,100%{box-shadow:0 0 0 0 rgba(229,57,53,.4)}70%{box-shadow:0 0 0 8px rgba(229,57,53,0)}}

    /* TOPBAR */
    .topbar{position:sticky;top:0;z-index:100;height:52px;background:rgba(7,7,15,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:12px}
    .back-btn{display:flex;align-items:center;gap:6px;color:#aaa;font-size:.85rem;font-weight:600;cursor:pointer;text-decoration:none;transition:.2s}
    .back-btn:hover{color:#fff}
    .back-btn svg{flex-shrink:0}
    .topbar-title{font-size:.95rem;font-weight:800;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* PLAYER SECTION */
    .player-wrap{background:#000;position:relative;width:100%;aspect-ratio:16/9;max-height:56vw}
    .player-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
    .player-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:linear-gradient(160deg,#0a0a1a,#050510);text-align:center;padding:20px}
    .player-placeholder-icon{font-size:2.5rem}
    .player-placeholder-title{font-size:.95rem;font-weight:700;color:#fff}
    .player-placeholder-sub{font-size:.75rem;color:var(--muted);line-height:1.6;max-width:260px}
    .player-setup-btn{margin-top:8px;padding:10px 22px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--blue-d),var(--blue));color:#fff;font-size:.82rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}

    /* MOVIE INFO */
    .movie-info{padding:16px 14px;animation:fadeUp .35s ease}
    .movie-info-title{font-size:1.4rem;font-weight:900;color:#fff;letter-spacing:-.5px;margin-bottom:6px}
    .movie-info-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
    .meta-chip{font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:100px;border:1px solid var(--border);color:#888;background:rgba(255,255,255,.03)}
    .meta-chip.hot{background:rgba(229,57,53,.12);border-color:rgba(229,57,53,.3);color:#ff8a87}
    .movie-info-desc{font-size:.82rem;color:var(--muted);line-height:1.7;margin-bottom:16px}
    .genre-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
    .genre-tag{font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:5px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:var(--blue);text-transform:uppercase;letter-spacing:.05em}

    /* DOWNLOAD SECTION */
    .dl-section{padding:0 14px 14px}
    .dl-section-title{font-size:.85rem;font-weight:800;color:#aaa;margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em}
    .dl-btn{display:flex;align-items:center;gap:10px;width:100%;padding:14px;border-radius:11px;border:1px solid rgba(59,130,246,.3);background:linear-gradient(135deg,rgba(29,78,216,.15),rgba(59,130,246,.08));cursor:pointer;font-family:'Inter',sans-serif;transition:.2s;margin-bottom:8px;text-decoration:none}
    .dl-btn:hover{border-color:rgba(59,130,246,.6);background:linear-gradient(135deg,rgba(29,78,216,.25),rgba(59,130,246,.15))}
    .dl-btn-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--blue-d),var(--blue));display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .dl-btn-icon svg{color:#fff}
    .dl-btn-text{flex:1;text-align:left}
    .dl-btn-label{font-size:.85rem;font-weight:700;color:#fff;display:block}
    .dl-btn-sub{font-size:.68rem;color:var(--muted);display:block;margin-top:2px}
    .dl-btn-arrow{color:#555;font-size:1rem}
    .dl-no-link{font-size:.75rem;color:#555;padding:10px;text-align:center;background:var(--card);border-radius:8px;border:1px solid var(--border)}

    /* AD SECTION */
    .ad-row{display:flex;justify-content:center;padding:10px 0}

    /* ── TIMED AD BOX (every 8 min) ── */
    #timedAdBox{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.82);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px}
    #timedAdBox.show{display:flex}
    .timed-ad-inner{background:linear-gradient(160deg,#0f0f1e,#080812);border:1px solid rgba(59,130,246,.3);border-radius:18px;padding:20px;max-width:360px;width:100%;position:relative;animation:modalIn .3s cubic-bezier(.34,1.56,.64,1)}
    .timed-ad-close{position:absolute;top:10px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:.2s}
    .timed-ad-close:hover{background:rgba(255,255,255,.2)}
    .timed-ad-label{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#555;margin-bottom:10px;text-align:center}
    .timed-ad-zone{min-height:100px;display:flex;align-items:center;justify-content:center}

    .bottom-safe{height:60px}
  </style>
</head>
<body>

<!-- TIMED AD BOX (every 8 min) -->
<div id="timedAdBox">
  <div class="timed-ad-inner">
    <button class="timed-ad-close" onclick="closeTimedAd()">&#215;</button>
    <div class="timed-ad-label">Advertisement</div>
    <div class="timed-ad-zone">
      <script type="text/javascript">
        atOptions = {'key':'bfb74bec0e3ae8c2d4aa4e7098b8801f','format':'iframe','height':90,'width':728,'params':{}};
      </script>
      <script type="text/javascript" src="https://www.highperformanceformat.com/bfb74bec0e3ae8c2d4aa4e7098b8801f/invoke.js"></script>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <a class="back-btn" href="/">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>
  <div class="topbar-title" id="topbarTitle">Loading...</div>
</div>

<!-- PLAYER -->
<div class="player-wrap" id="playerWrap">
  <!-- Bunny.net player loads here -->
  <div class="player-placeholder" id="playerPlaceholder">
    <div class="player-placeholder-icon">&#127916;</div>
    <div class="player-placeholder-title">Setting up player...</div>
    <div class="player-placeholder-sub">Loading video...</div>
  </div>
</div>

<!-- AD after player -->
<div class="ad-row">
  <script type="text/javascript">
    atOptions = {'key':'53c7cf734ecaad9717bb019ff323c97c','format':'iframe','height':50,'width':320,'params':{}};
  </script>
  <script type="text/javascript" src="https://www.highperformanceformat.com/53c7cf734ecaad9717bb019ff323c97c/invoke.js"></script>
</div>

<!-- MOVIE INFO -->
<div class="movie-info" id="movieInfo" style="display:none">
  <div class="movie-info-title" id="infoTitle"></div>
  <div class="movie-info-meta" id="infoMeta"></div>
  <div class="genre-row" id="infoGenres"></div>
  <div class="movie-info-desc" id="infoDesc"></div>
</div>

<!-- AD between info and download -->
<div class="ad-row">
  <script type="text/javascript">
    atOptions = {'key':'238a2051f1250c6dfb14686280350c4d','format':'iframe','height':250,'width':300,'params':{}};
  </script>
  <script type="text/javascript" src="https://www.highperformanceformat.com/238a2051f1250c6dfb14686280350c4d/invoke.js"></script>
</div>

<!-- DOWNLOAD SECTION -->
<div class="dl-section" id="dlSection" style="display:none">
  <div class="dl-section-title">&#11015; Download</div>
  <div id="dlLinks"></div>
</div>

<div class="bottom-safe"></div>

<script src="movies.js"></script>
<script>
(function(){

/* ── Bunny.net Library ID ── */
var BUNNY_LIBRARY_ID = '698857';

/* ── Merge admin movies ── */
try {
  var adminMovies = JSON.parse(localStorage.getItem('_nx_admin_movies') || '[]');
  if(adminMovies.length) MOVIES = MOVIES.concat(adminMovies);
} catch(e){}

/* ── Get slug from URL ── */
var params = new URLSearchParams(window.location.search);
var slug   = params.get('slug') || '';
var movie  = MOVIES.find(function(m){ return m.slug === slug; });

function init(){
  if(!movie){
    document.getElementById('topbarTitle').textContent = 'Movie Not Found';
    document.getElementById('playerPlaceholder').querySelector('.player-placeholder-title').textContent = 'Movie not found';
    document.getElementById('playerPlaceholder').querySelector('.player-placeholder-sub').textContent = 'Go back and try again.';
    return;
  }

  document.title = movie.title + ' — NEXFLIX';
  document.getElementById('topbarTitle').textContent = movie.title;

  /* ── Load Bunny.net Player ── */
  var videoId = movie.bunnyVideoId || '';
  var playerWrap = document.getElementById('playerWrap');

  if(videoId && videoId !== 'YOUR_VIDEO_ID_HERE' && videoId.trim() !== ''){
    var iframe = document.createElement('iframe');
    iframe.src = 'https://iframe.mediadelivery.net/embed/'+BUNNY_LIBRARY_ID+'/'+videoId+'?autoplay=false&loop=false&muted=false&preload=true&responsive=true';
    iframe.allow = 'accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture';
    iframe.allowFullscreen = true;
    iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';
    playerWrap.innerHTML = '';
    playerWrap.appendChild(iframe);
  } else {
    /* Placeholder if video ID not set */
    document.getElementById('playerPlaceholder').innerHTML =
      '<div class="player-placeholder-icon">&#127916;</div>'+
      '<div class="player-placeholder-title">'+movie.title+'</div>'+
      '<div class="player-placeholder-sub">Video ID not configured yet. Add the bunny.net Video ID in movies.js or via the Admin panel.</div>';
  }

  /* ── Movie Info ── */
  var info = document.getElementById('movieInfo');
  info.style.display = 'block';
  document.getElementById('infoTitle').textContent = movie.title;

  var meta = document.getElementById('infoMeta');
  meta.innerHTML = '';
  var chips = [
    movie.year,
    movie.dur,
    movie.cert,
    '★ '+movie.match+'%'
  ].filter(Boolean);
  chips.forEach(function(c){
    var el = document.createElement('span');
    el.className = 'meta-chip'+(c.includes('★')?'':' ');
    el.textContent = c;
    meta.appendChild(el);
  });

  var genreRow = document.getElementById('infoGenres');
  genreRow.innerHTML = '';
  (movie.genres||[]).forEach(function(g){
    var t = document.createElement('span');
    t.className = 'genre-tag';
    t.textContent = g;
    genreRow.appendChild(t);
  });

  document.getElementById('infoDesc').textContent = movie.desc || '';

  /* ── Download Links ── */
  var dlSection = document.getElementById('dlSection');
  var dlLinks   = document.getElementById('dlLinks');
  dlSection.style.display = 'block';

  if(movie.downloadLink && movie.downloadLink.trim()){
    var a = document.createElement('a');
    a.href = movie.downloadLink;
    a.target = '_blank';
    a.className = 'dl-btn';
    a.innerHTML =
      '<div class="dl-btn-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>'+
      '<div class="dl-btn-text"><span class="dl-btn-label">Download '+movie.title+'</span><span class="dl-btn-sub">Free HD Download</span></div>'+
      '<span class="dl-btn-arrow">&#8250;</span>';
    dlLinks.appendChild(a);
  } else if(movie.episodes && movie.episodes.length){
    movie.episodes.forEach(function(ep){
      if(!ep.downloadLink) return;
      var a = document.createElement('a');
      a.href = ep.downloadLink;
      a.target = '_blank';
      a.className = 'dl-btn';
      a.innerHTML =
        '<div class="dl-btn-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>'+
        '<div class="dl-btn-text"><span class="dl-btn-label">Episode '+ep.ep+'</span><span class="dl-btn-sub">Free HD Download</span></div>'+
        '<span class="dl-btn-arrow">&#8250;</span>';
      dlLinks.appendChild(a);
    });
  } else {
    dlLinks.innerHTML = '<div class="dl-no-link">Download link coming soon. Check back later!</div>';
  }
}

/* ── TIMED AD BOX (every 8 min) ── */
var TIMED_AD_MS = 8 * 60 * 1000;
var _timedAdTimer = null;

window.closeTimedAd = function(){
  document.getElementById('timedAdBox').classList.remove('show');
  scheduleTimedAd();
};

function showTimedAd(){
  document.getElementById('timedAdBox').classList.add('show');
}

function scheduleTimedAd(){
  if(_timedAdTimer) clearTimeout(_timedAdTimer);
  _timedAdTimer = setTimeout(showTimedAd, TIMED_AD_MS);
}
scheduleTimedAd();

init();
})();
</script>
</body>
</html>
